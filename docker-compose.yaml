version: '3.9'
services:

  kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_VERSION:-5.3.1}
    restart: always
    container_name: kafka
    hostname: kafka
    environment:
      - KAFKA_BROKER_ID=0
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:29092,OUTSIDE://0.0.0.0:19092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,OUTSIDE://localhost:19092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_NUM_PARTITIONS=3
      - CONFLUENT_SUPPORT_METRICS_ENABLE=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
    ports:
      - "19092:19092"
    # links: [zookeeper]
    healthcheck:
      test: [ "CMD-SHELL", "cub kafka-ready -b localhost:19092 1 40" ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./data/kafka/:/var/lib/kafka/data

  zookeeper:
    hostname: zookeeper
    restart: always
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:${CONFLUENT_VERSION:-5.3.1}
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
    ports:
      - "2181:2181"
    volumes:
      - ./data/zookeeper/:/var/lib/zookeeper
    healthcheck:
      test: [ "CMD", "cub", "zk-ready", "localhost:2181", "30" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  topic-init:
    image: confluentinc/cp-zookeeper:${CONFLUENT_VERSION:-5.3.1}
    depends_on:
      kafka:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    entrypoint: >
      bash -c '
        echo "Waiting for broker …";
        # cub kafka-ready -b kafka:29092 1 40
        echo "Creating topics …";
        cd /usr/bin;
        for T in "CLIENT-REQUEST" "SnapShotLogTopic" "CoreEventLogTopic" "RelayerStateQueue" "CLIENT-FAILED-REQUEST"; do
          kafka-topics \
            --topic $$T \
            --create --if-not-exists \
            --zookeeper zookeeper:2181 \
            --partitions 1 \
            --replication-factor 1 \
            --config retention.ms=-1 \
            --config cleanup.policy=compact \
            --config message.timestamp.type=LogAppendTime;
        done
        echo "All topics created successfully"
      '
    restart: "no"
