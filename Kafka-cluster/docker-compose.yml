services:
  kafka-1:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka-1
    hostname: kafka-1
    restart: always
    environment:
      - KAFKA_KRAFT_MODE=true
      - CLUSTER_ID=Mk3OEYBSD34fcwNTJENDM2Qk
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-1:9092,EXTERNAL://${KAFKA_1_IP}:${KAFKA_1_BROKER_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_MIN_INSYNC_REPLICAS=2
      - KAFKA_NUM_PARTITIONS=3
      - CONFLUENT_SUPPORT_METRICS_ENABLE=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
    ports:
      - "${KAFKA_1_BROKER_PORT}:19092"
      - "${KAFKA_1_CONTROLLER_PORT}:9093"
    volumes:
      - ${KAFKA_1_DATA_DIR}:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 40"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kafka-cluster-net

  kafka-2:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka-2
    hostname: kafka-2
    restart: always
    environment:
      - KAFKA_KRAFT_MODE=true
      - CLUSTER_ID=Mk3OEYBSD34fcwNTJENDM2Qk
      - KAFKA_NODE_ID=2
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-2:9092,EXTERNAL://${KAFKA_2_IP}:${KAFKA_2_BROKER_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_MIN_INSYNC_REPLICAS=2
      - KAFKA_NUM_PARTITIONS=3
      - CONFLUENT_SUPPORT_METRICS_ENABLE=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
    ports:
      - "${KAFKA_2_BROKER_PORT}:19092"
      - "${KAFKA_2_CONTROLLER_PORT}:9093"
    volumes:
      - ${KAFKA_2_DATA_DIR}:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 40"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kafka-cluster-net

  kafka-3:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka-3
    hostname: kafka-3
    restart: always
    environment:
      - KAFKA_KRAFT_MODE=true
      - CLUSTER_ID=Mk3OEYBSD34fcwNTJENDM2Qk
      - KAFKA_NODE_ID=3
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-3:9092,EXTERNAL://${KAFKA_3_IP}:${KAFKA_3_BROKER_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_MIN_INSYNC_REPLICAS=2
      - KAFKA_NUM_PARTITIONS=3
      - CONFLUENT_SUPPORT_METRICS_ENABLE=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
    ports:
      - "${KAFKA_3_BROKER_PORT}:19092"
      - "${KAFKA_3_CONTROLLER_PORT}:9093"
    volumes:
      - ${KAFKA_3_DATA_DIR}:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 40"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kafka-cluster-net

  topic-init:
    image: confluentinc/cp-kafka:7.7.7
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    entrypoint: >
      bash -c '
        echo "Waiting for broker ...";
        sleep 10;
        cub kafka-ready -b kafka-1:9092 3 120;
        echo "Creating topics ...";
        cd /usr/bin;
        for T in "CLIENT-REQUEST" "SnapShotLogTopic" "CoreEventLogTopic" "RelayerStateQueue" "CLIENT-FAILED-REQUEST"; do
          kafka-topics \
            --topic $$T \
            --create --if-not-exists \
            --bootstrap-server kafka-1:9092 \
            --partitions 1 \
            --replication-factor 3 \
            --config retention.ms=-1 \
            --config cleanup.policy=compact \
            --config message.timestamp.type=LogAppendTime;
        done
        echo "All topics created successfully"
      '
    restart: "no"
    networks:
      - kafka-cluster-net

networks:
  kafka-cluster-net:
    driver: bridge
